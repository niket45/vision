name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test & Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Black formatting check
        run: black --check src/ tests/

      - name: Ruff lint
        run: ruff check src/ tests/

      - name: Mypy type check
        run: mypy src/

      - name: Run unit tests
        run: pytest tests/ --cov=src --cov-report=xml -v

      - name: Validate dataset registry
        run: python -c "
import yaml, pathlib
data = yaml.safe_load(pathlib.Path('datasets/registry.yaml').read_text())
assert 'sources' in data, 'Missing sources key'
assert data['summary']['total_pages'] > 0, 'No pages registered'
print(f'Registry OK: {data[\"summary\"][\"total_pages\"]} pages across {data[\"summary\"][\"total_chapters\"]} chapters')
"
